:root{--bg:#080b11;--panel:#111826;--line:#1f2937;--text:#dfe6f0;--muted:#8896a9;--accent:#5cc8ff;--amb:#f5b74e;
--brand:#5cc8ff;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
@media(prefers-color-scheme:light){:root{--bg:#eef1f5;--panel:#fff;--line:#d3dae3;--text:#16202c;--muted:#5a6a7b;--accent:#0e7fb0;--amb:#b3730d;--brand:#1e3a8a}}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);display:grid;place-items:center}
#gate{display:none;place-items:center;min-height:100vh;width:100%;padding:24px}
.card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
padding:30px 28px;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.bigmark{color:var(--brand);width:76px;height:76px;display:block;margin:0 auto 16px}
.mk{display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--mono);font-weight:600;font-size:16px;margin-bottom:6px}
.sub{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amb);margin-bottom:18px;text-align:center}
p.note{font-size:13.5px;line-height:1.55;color:var(--muted);margin:0 0 18px}
label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
input{width:100%;font-family:var(--mono);font-size:15px;color:var(--text);background:var(--bg);border:1px solid var(--line);
border-radius:10px;padding:12px 13px;outline:none}
input:focus{border-color:var(--accent)}
button{width:100%;margin-top:14px;font-family:var(--mono);font-size:14px;font-weight:600;color:#04121b;background:var(--accent);
border:0;border-radius:10px;padding:13px;cursor:pointer;transition:.15s}
button:hover{filter:brightness(1.06)}
#err{display:none;color:var(--amb);font-size:12.5px;margin-top:12px;font-family:var(--mono)}
.fine{margin-top:18px;font-size:11.5px;line-height:1.5;color:var(--muted)}
